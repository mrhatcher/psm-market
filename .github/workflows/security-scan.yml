name: Security Scan + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: SECURITY SCAN ──────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for eval() and document.write()
        run: |
          FAIL=0
          if grep -rq 'eval(' *.html 2>/dev/null; then
            echo "::error::eval() found in HTML -- XSS risk"
            FAIL=1
          else
            echo "PASS: No eval() usage"
          fi
          if grep -rq 'document\.write(' *.html 2>/dev/null; then
            echo "::error::document.write() found -- XSS risk"
            FAIL=1
          else
            echo "PASS: No document.write() usage"
          fi
          exit $FAIL

      - name: Check for http:// mixed content
        run: |
          COUNT=$(grep -roh 'http://[^"'\'' >]*' *.html 2>/dev/null | grep -v localhost | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::$COUNT http:// link(s) found -- use https:// to avoid mixed content"
            grep -rn 'http://[^"'\'' >]*' *.html | grep -v localhost
            exit 1
          fi
          echo "PASS: All external links use https://"

      - name: Check vercel.json security headers
        run: |
          if [ ! -f vercel.json ]; then
            echo "::error::vercel.json missing -- no security headers configured"
            exit 1
          fi
          FAIL=0
          for header in "X-Frame-Options" "X-Content-Type-Options" "Content-Security-Policy" "Referrer-Policy"; do
            if grep -q "$header" vercel.json; then
              echo "PASS: $header configured"
            else
              echo "::error::$header missing from vercel.json"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/html
            p/secrets
        continue-on-error: true

  # ── JOB 2: DEPLOY (only if security passes) ───────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Post deployment URL to summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "Site deployed to production after passing all security checks." >> $GITHUB_STEP_SUMMARY
